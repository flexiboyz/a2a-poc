<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A2A Pipeline Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }

    .layout { display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Agent Palette ─────────────────────────── */
    .palette {
      background: #12121a;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      border: 1px solid #1e1e2e;
    }
    .palette h2 { font-size: 0.85rem; text-transform: uppercase; color: #666; letter-spacing: 0.1em; margin-bottom: 0.8rem; }
    #agents { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .agent-card {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      padding: 0.7rem 1rem;
      cursor: grab;
      transition: all 0.2s;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
    }
    .agent-card:hover { border-color: #7c3aed; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,58,237,0.2); }
    .agent-card:active { cursor: grabbing; }
    .agent-card .emoji { font-size: 1.2rem; }
    .agent-card .name { font-weight: 600; font-size: 0.85rem; white-space: nowrap; }
    .agent-card .desc { display: none; }
    .agent-card .skill { display: none; }
    .agent-card .model-tag { font-size: 0.6rem; color: #22c55e; padding: 1px 6px; background: rgba(34,197,94,0.1); border-radius: 4px; font-family: monospace; white-space: nowrap; }
    .agent-card.dragging { opacity: 0.4; }

    /* ── Main Area ─────────────────────────────── */
    .main { display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── Pipeline Drop Zone ────────────────────── */
    .pipeline-zone {
      background: #12121a;
      border: 2px dashed #2a2a3e;
      border-radius: 12px;
      padding: 1.5rem;
      min-height: 120px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      transition: all 0.2s;
    }
    .pipeline-zone.drag-over { border-color: #7c3aed; background: rgba(124,58,237,0.05); }
    .pipeline-zone.empty::after {
      content: 'Drag agents here to build your pipeline →';
      color: #444;
      font-size: 0.9rem;
      margin: auto;
    }

    .pipeline-chip {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: grab;
      position: relative;
      transition: all 0.15s;
    }
    .pipeline-chip:hover { border-color: #ec4899; }
    .pipeline-chip .remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: #ef4444;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .pipeline-chip:hover .remove { opacity: 1; }

    .arrow { color: #444; font-size: 1.2rem; }

    /* ── Controls ──────────────────────────────── */
    .controls { display: flex; gap: 1rem; align-items: center; }
    .btn {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-run {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
    }
    .btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
    .btn-run:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-clear { background: #1e1e2e; color: #888; }
    .btn-clear:hover { background: #2a2a3e; color: #e0e0e0; }
    .input-field {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }
    .input-field:focus { border-color: #7c3aed; }

    /* ── Output ────────────────────────────────── */
    .output {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1.5rem;
      flex: 1;
      min-height: 200px;
    }
    .output h2 { font-size: 0.85rem; text-transform: uppercase; color: #666; letter-spacing: 0.1em; margin-bottom: 1rem; }
    .output-empty { color: #333; font-style: italic; }

    .step-result {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.8rem;
      animation: slideIn 0.3s ease;
    }
    .step-result.running { border-color: #7c3aed; }
    .step-result.completed { border-color: #22c55e; }
    .step-result .step-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .step-result .step-header .badge {
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .badge-running { background: rgba(124,58,237,0.2); color: #7c3aed; }
    .badge-completed { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-pending { background: rgba(102,102,102,0.2); color: #666; }
    .badge-input-required { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .badge-resumed { background: rgba(124,58,237,0.2); color: #7c3aed; }
    .badge-branched { background: rgba(124,58,237,0.2); color: #7c3aed; }
    .badge-failed { background: rgba(239,68,68,0.2); color: #ef4444; }
    .badge-escalated { background: rgba(239,68,68,0.2); color: #ef4444; }
    .badge-retrying { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .badge-canceled { background: rgba(102,102,102,0.2); color: #666; }
    .step-result.failed { border-color: #ef4444; }
    .step-result.canceled { opacity: 0.4; }
    .step-result .step-output { font-size: 0.85rem; color: #aaa; white-space: pre-wrap; user-select: text; }
    .input-prompt input { user-select: text; }

    .pipeline-done {
      text-align: center;
      padding: 1rem;
      color: #22c55e;
      font-weight: 600;
      animation: slideIn 0.3s ease;
    }

    /* Input required prompt */
    .input-prompt {
      margin-top: 0.8rem;
      padding: 1rem;
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.3);
      border-radius: 8px;
      animation: slideIn 0.3s ease;
    }
    .input-prompt p { color: #fbbf24; font-size: 0.9rem; margin-bottom: 0.8rem; }
    .input-prompt .input-row { display: flex; gap: 0.5rem; }
    .input-prompt input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      padding: 0.5rem 0.8rem;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }
    .input-prompt input:focus { border-color: #fbbf24; }
    .input-prompt button {
      background: #fbbf24;
      color: #0a0a0f;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.2rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .input-prompt button:hover { background: #f59e0b; }

    /* ── YAML Inspector Modal ─────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }
    .modal {
      background: #12121a;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      width: 90%;
      max-width: 700px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.3s ease;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid #1e1e2e;
    }
    .modal-header h3 {
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .modal-close {
      background: none;
      border: none;
      color: #666;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: #1e1e2e; color: #e0e0e0; }
    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }
    .yaml-block {
      background: #0a0a0f;
      border: 1px solid #1e1e2e;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #a0a0b0;
      white-space: pre-wrap;
      word-break: break-word;
      user-select: text;
    }
    .yaml-block .yaml-key { color: #7c3aed; }
    .yaml-block .yaml-string { color: #22c55e; }
    .yaml-block .yaml-number { color: #fbbf24; }
    .yaml-block .yaml-bool { color: #ec4899; }
    .modal-footer {
      padding: 0.8rem 1.5rem;
      border-top: 1px solid #1e1e2e;
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .btn-copy {
      background: #1e1e2e;
      color: #888;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-copy:hover { background: #2a2a3e; color: #e0e0e0; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }


    /* ── Cost tracking ────────────────────────── */
    .cost-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(251,191,36,0.1);
      color: #fbbf24;
      margin-left: 0.5rem;
    }
    .cost-badge.estimated { opacity: 0.7; }
    .cost-summary {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      margin-top: 0.5rem;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .cost-summary .metric {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .cost-summary .metric .label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
    .cost-summary .metric .value { font-size: 1.1rem; font-weight: 600; color: #fbbf24; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #7c3aed;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>⚡ A2A Pipeline Builder</h1>
  <p class="subtitle">Click agents to add them to your pipeline, then run it. · <a href="monitoring.html" style="color:#7c3aed;text-decoration:none;">📊 Monitor</a></p>

  <div class="layout">
    <!-- Palette -->
    <div class="palette">
      <h2>🤖 Agents</h2>
      <div id="agents"></div>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Drop zone -->
      <div id="pipeline" class="pipeline-zone empty"></div>

      <!-- Controls -->
      <div class="controls">
        <select id="project-select" style="padding:0.6rem 1rem;background:#1e1e2e;color:#e0e0e0;border:1px solid #2a2a3e;border-radius:8px;font-size:0.9rem;min-width:160px;">
          <option value="">No project</option>
        </select>
        <input id="input" class="input-field" placeholder="Enter a topic for the pipeline..." value="Should we use A2A for multi-agent orchestration?">
        <button id="btn-run" class="btn btn-run" disabled>▶ Run</button>
        <button id="btn-clear" class="btn btn-clear">✕ Clear</button>
      </div>

      <!-- Output -->
      <div class="output">
        <h2>📡 Pipeline Output</h2>
        <div id="output"><p class="output-empty">Build a pipeline and hit Run to see results here.</p></div>
      </div>
    </div>
  </div>

  <script>
    const pipelineEl = document.getElementById('pipeline');
    const agentsEl = document.getElementById('agents');
    const outputEl = document.getElementById('output');
    const inputEl = document.getElementById('input');
    const btnRun = document.getElementById('btn-run');
    const btnClear = document.getElementById('btn-clear');

    let pipeline = []; // { name, emoji }[]
    let agents = [];
    let projects = [];
    let stepOutputs = {}; // { stepIndex: outputString }
    let runCost = { totalTokens: 0, totalCost: 0, steps: 0 };
    const basePath = window.location.pathname.replace(/\/$/, '');

    // Load projects
    fetch(`${basePath}/api/projects`).then(r => r.json()).then(data => {
      projects = data;
      const sel = document.getElementById('project-select');
      data.forEach(p => {
        const opt = document.createElement('option');
        opt.value = JSON.stringify(p);
        opt.textContent = `${p.name}${p.workspace_path ? '' : ' (no workspace)'}`;
        sel.appendChild(opt);
      });
    });

    function getFullInput() {
      const raw = inputEl.value;
      const sel = document.getElementById('project-select');
      const projectJson = sel?.value;
      if (!projectJson) return raw;
      try {
        const p = JSON.parse(projectJson);
        return `## Target Project\nname: ${p.name}\ngithub_repo: ${p.github_repo}\nworkspace_path: ${p.workspace_path || 'N/A'}\nbranch: ${p.active_branch}\n\n## Task\n${raw}`;
      } catch { return raw; }
    }

    // ── YAML Inspector ───────────────────────────────────────────
    function highlightYaml(text) {
      return text
        .replace(/^(\s*)([\w_.-]+)(\s*:)/gm, '$1<span class="yaml-key">$2</span>$3')
        .replace(/:\s*"([^"]*)"$/gm, ': "<span class="yaml-string">$1</span>"')
        .replace(/:\s*'([^']*)'$/gm, ": '<span class=\"yaml-string\">$1</span>'")
        .replace(/:\s*(\d+\.?\d*)$/gm, ': <span class="yaml-number">$1</span>')
        .replace(/:\s*(true|false)$/gm, ': <span class="yaml-bool">$1</span>');
    }

    function openInspector(stepIndex) {
      const output = stepOutputs[stepIndex];
      if (!output) return;
      const agentInfo = pipeline[stepIndex] || { emoji: '❓', name: 'Unknown' };

      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };

      backdrop.innerHTML = `
        <div class="modal">
          <div class="modal-header">
            <h3>${agentInfo.emoji} ${agentInfo.name} — Output Inspector</h3>
            <button class="modal-close" onclick="this.closest('.modal-backdrop').remove()">✕</button>
          </div>
          <div class="modal-body">
            <div class="yaml-block">${highlightYaml(output.replace(/</g, '&lt;').replace(/>/g, '&gt;'))}</div>
          </div>
          <div class="modal-footer">
            <button class="btn-copy" onclick="navigator.clipboard.writeText(stepOutputs[${stepIndex}]);this.textContent='Copied!';setTimeout(()=>this.textContent='📋 Copy',1500)">📋 Copy</button>
          </div>
        </div>`;
      document.body.appendChild(backdrop);

      // Close on Escape
      const onKey = (e) => { if (e.key === 'Escape') { backdrop.remove(); document.removeEventListener('keydown', onKey); } };
      document.addEventListener('keydown', onKey);
    }

    // ── Load agents ──────────────────────────────────────────────
    fetch(basePath + '/api/agents')
      .then(r => r.json())
      .then(data => {
        agents = data;
        renderAgents();
      });

    function renderAgents() {
      agentsEl.innerHTML = agents.map(a => `
        <div class="agent-card" draggable="true" data-agent="${a.name}" data-emoji="${a.emoji}">
          <div class="emoji">${a.emoji}</div>
          <div class="name">${a.name}</div>
          <div class="desc">${a.description}</div>
          <div class="skill">${a.skill}</div>
          ${a.model ? `<div class="model-tag" title="${a.modelFull || a.model}">${a.model}</div>` : ''}
        </div>
      `).join('');

      // Click to add (works on all devices)
      document.querySelectorAll('.agent-card').forEach(card => {
        card.addEventListener('click', () => {
          pipeline.push({ name: card.dataset.agent, emoji: card.dataset.emoji });
          renderPipeline();
        });
        // Drag events (desktop bonus)
        card.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('agent', card.dataset.agent);
          e.dataTransfer.setData('emoji', card.dataset.emoji);
          card.classList.add('dragging');
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
      });
    }

    // ── Pipeline drop zone ───────────────────────────────────────

    pipelineEl.addEventListener('dragover', (e) => {
      e.preventDefault();
      pipelineEl.classList.add('drag-over');
    });
    pipelineEl.addEventListener('dragleave', () => pipelineEl.classList.remove('drag-over'));
    pipelineEl.addEventListener('drop', (e) => {
      e.preventDefault();
      pipelineEl.classList.remove('drag-over');
      const name = e.dataTransfer.getData('agent');
      const emoji = e.dataTransfer.getData('emoji');
      if (name) {
        pipeline.push({ name, emoji });
        renderPipeline();
      }
    });

    function renderPipeline() {
      if (pipeline.length === 0) {
        pipelineEl.innerHTML = '';
        pipelineEl.classList.add('empty');
        btnRun.disabled = true;
        return;
      }
      pipelineEl.classList.remove('empty');
      btnRun.disabled = false;

      pipelineEl.innerHTML = pipeline.map((a, i) => `
        ${i > 0 ? '<span class="arrow">→</span>' : ''}
        <div class="pipeline-chip" draggable="true" data-index="${i}">
          <span>${a.emoji}</span>
          <span>${a.name}</span>
          <div class="remove" onclick="removeStep(${i})">✕</div>
        </div>
      `).join('');

      // Enable reorder via drag within pipeline
      const chips = pipelineEl.querySelectorAll('.pipeline-chip');
      chips.forEach(chip => {
        chip.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('reorder', chip.dataset.index);
        });
      });
    }

    // Image upload handling for Moodboard agent — resize to max 800px
    window._uploadedImages = [];
    window.handleImageUpload = (input) => {
      const files = Array.from(input.files).slice(0, 4);
      const preview = document.getElementById('image-preview');
      window._uploadedImages = [];
      if (preview) preview.innerHTML = '';
      
      files.forEach((file, i) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            // Resize to max 800px on longest side
            const MAX = 800;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const resized = canvas.toDataURL('image/jpeg', 0.85);
            window._uploadedImages.push(resized);
            if (preview) {
              const kb = Math.round(resized.length * 3/4 / 1024);
              preview.innerHTML += `<div style="position:relative;"><img src="${resized}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #333;"><span style="position:absolute;top:2px;right:2px;background:#0a0a0f;color:#888;font-size:0.65rem;padding:1px 4px;border-radius:3px;">${i+1} (${kb}kb)</span></div>`;
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    };

    window.sendReply = async (runId, directAction) => {
      let reply;
      if (directAction) {
        reply = directAction;
      } else {
        const input = document.getElementById('user-reply');
        const textVal = input?.value?.trim() || '';
        // Append uploaded images as data URLs
        if (window._uploadedImages && window._uploadedImages.length > 0) {
          reply = (textVal || 'images attached') + '\n' + window._uploadedImages.join('\n');
          window._uploadedImages = [];
        } else {
          if (!textVal) return;
          reply = textVal;
        }
        if (input) input.disabled = true;
      }
      // Disable all buttons in the escalation/input prompt
      document.querySelectorAll('.input-prompt button').forEach(b => b.disabled = true);
      console.log(`[sendReply] runId=${runId}, reply length=${reply.length}, has images=${reply.includes('data:image/')}`);
      try {
        const res = await fetch(`${basePath}/api/runs/${runId}/reply`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reply }),
        });
        if (!res.ok) console.error('[sendReply] Error:', res.status, await res.text());
      } catch (err) {
        console.error('[sendReply] Failed:', err);
        alert('Failed to send reply — check console');
      }
    };

    window.removeStep = (i) => {
      pipeline.splice(i, 1);
      renderPipeline();
    };

    window.replayPipeline = async (runId, pickStep, directFromStep) => {
      let fromStep = typeof directFromStep === 'number' ? directFromStep : 0;
      if (pickStep && typeof directFromStep !== 'number') {
        const steps = pipeline.map((a, i) => `${i}: ${a.emoji} ${a.name}`).join('\n');
        const val = prompt(`Replay from which step?\n\n${steps}`, '0');
        if (val === null) return;
        fromStep = parseInt(val, 10) || 0;
      }
      const newInput = inputEl.value;
      outputEl.innerHTML = '<p class="output-empty"><span class="spinner"></span> Replaying pipeline...</p>';
      const rRes = await fetch(`${basePath}/api/runs/${runId}/replay`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: newInput, from_step: fromStep }),
      });
      const { runId: newRunId, agents: agentList } = await rRes.json();
      outputEl.innerHTML = '';
      agentList.forEach((name, i) => {
        const a = agents.find(x => x.name === name);
        const isCopied = i < fromStep;
        outputEl.innerHTML += `
          <div class="step-result ${isCopied ? 'completed' : ''}" id="step-${i}">
            <div class="step-header">
              <span>${a?.emoji || '?'}</span>
              <strong>${name}</strong>
              <span class="badge ${isCopied ? 'badge-completed' : 'badge-pending'}">${isCopied ? 'copied' : 'pending'}</span>
            </div>
            <div class="step-output" style="color: #444;">${isCopied ? 'Copied from original run' : 'Waiting...'}</div>
          </div>`;
      });
      const evtSource = new EventSource(`${basePath}/api/runs/${newRunId}/stream`);
      setupSSE(evtSource, newRunId);
    };

    btnClear.addEventListener('click', () => {
      pipeline = [];
      stepOutputs = {};
      renderPipeline();
      outputEl.innerHTML = '<p class="output-empty">Build a pipeline and hit Run to see results here.</p>';
    });

    // ── Run Pipeline ─────────────────────────────────────────────

    btnRun.addEventListener('click', async () => {
      if (pipeline.length === 0) return;
      btnRun.disabled = true;
      stepOutputs = {};
      outputEl.innerHTML = '';

      // Create pipeline
      const pRes = await fetch(basePath + '/api/pipelines', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'Quick Run', agents: pipeline.map(a => a.name) }),
      });
      const { id: pipelineId } = await pRes.json();

      // Show pending steps
      pipeline.forEach((a, i) => {
        outputEl.innerHTML += `
          <div class="step-result" id="step-${i}">
            <div class="step-header">
              <span>${a.emoji}</span>
              <strong>${a.name}</strong>
              <span class="badge badge-pending">pending</span>
            </div>
            <div class="step-output" style="color: #444;">Waiting...</div>
          </div>`;
      });

      // Run
      const rRes = await fetch(`${basePath}/api/pipelines/${pipelineId}/run`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: getFullInput() }),
      });
      const { runId } = await rRes.json();

      // SSE
      const evtSource = new EventSource(`${basePath}/api/runs/${runId}/stream`);
      setupSSE(evtSource, runId);
    });

    function setupSSE(evtSource, runId) {
      evtSource.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === 'step-started') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.add('running');
            el.querySelector('.badge').className = 'badge badge-running';
            el.querySelector('.badge').textContent = 'running';
            el.querySelector('.step-output').innerHTML = '<span class="spinner"></span> Working...';
          }
        }

        if (data.type === 'step-input-required') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.remove('running');
            el.querySelector('.badge').className = 'badge badge-input-required';
            el.querySelector('.badge').textContent = 'input required';
            const isImageRequest = data.question.toLowerCase().includes('image') || data.question.toLowerCase().includes('upload') || data.question.toLowerCase().includes('moodboard');
            el.querySelector('.step-output').innerHTML = data.question +
              `<div class="input-prompt">
                <p>⏸️ Agent is waiting for your input:</p>
                ${isImageRequest ? `
                <div style="margin-bottom:0.5rem;">
                  <label style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;background:#1e1e2e;border:1px dashed #3b82f6;border-radius:8px;cursor:pointer;font-size:0.85rem;color:#3b82f6;">
                    📎 Upload images
                    <input type="file" id="image-upload" accept="image/*" multiple style="display:none" onchange="handleImageUpload(this)">
                  </label>
                  <div id="image-preview" style="display:flex;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap;"></div>
                </div>
                ` : ''}
                <div class="input-row">
                  <input id="user-reply" placeholder="${isImageRequest ? 'Upload images then click Send, or type skip...' : 'Type your reply...'}" autofocus>
                  <button onclick="sendReply('${runId}')">Send →</button>
                </div>
              </div>`;
            document.getElementById('user-reply')?.focus();
          }
        }

        if (data.type === 'step-resumed') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.add('running');
            el.querySelector('.badge').className = 'badge badge-running';
            el.querySelector('.badge').textContent = 'resuming';
            // Remove the input prompt, show spinner
            const prompt = el.querySelector('.input-prompt');
            if (prompt) prompt.remove();
            el.querySelector('.step-output').innerHTML += '<br><span class="spinner"></span> Resuming with your input...';
          }
        }

        if (data.type === 'step-retry') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.querySelector('.badge').className = 'badge badge-retrying';
            el.querySelector('.badge').textContent = `retry ${data.attempt}/${data.maxAttempts}`;
            el.querySelector('.step-output').innerHTML = `<span class="spinner"></span> Retrying (attempt ${data.attempt + 1}/${data.maxAttempts})...`;
          }
        }

        if (data.type === 'step-escalated') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.remove('running');
            el.classList.add('failed');
            el.querySelector('.badge').className = 'badge badge-escalated';
            el.querySelector('.badge').textContent = 'escalated';
            const attemptsHtml = (data.attempts || []).map((a, idx) =>
              `<div style="margin:4px 0;padding:6px;background:#1a1a2e;border-radius:4px;font-size:0.8rem;">
                <strong>Attempt ${a.attempt}:</strong> ${a.errors.map(e => `${e.path || 'root'}: expected ${e.expected}, got ${e.received}`).join('; ')}
              </div>`
            ).join('');
            el.querySelector('.step-output').innerHTML =
              `<div style="margin-bottom:8px;">${data.question}</div>` +
              attemptsHtml +
              `<div class="input-prompt">
                <p>⚠️ Choose an action:</p>
                <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
                  <button onclick="sendReply('${runId}','abort')" style="background:#ef4444;color:white;border:none;border-radius:6px;padding:0.5rem 1rem;font-weight:600;cursor:pointer;">Abort</button>
                  <button onclick="sendReply('${runId}','retry')" style="background:#fbbf24;color:#0a0a0f;border:none;border-radius:6px;padding:0.5rem 1rem;font-weight:600;cursor:pointer;">Retry</button>
                </div>
                <div class="input-row" style="margin-top:0.5rem;">
                  <input id="user-reply" placeholder="Or type fix:<yaml> or retry:<instructions>...">
                  <button onclick="sendReply('${runId}')">Send →</button>
                </div>
              </div>`;
          }
        }

        if (data.type === 'step-completed') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.remove('running');
            el.classList.add('completed');
            // Store full output for inspector
            stepOutputs[data.step] = data.output;
            if (data.tokenUsage) {
              runCost.totalTokens += data.tokenUsage.total_tokens;
              runCost.totalCost += data.tokenUsage.estimated_cost;
              runCost.steps++;
            }
            // Show truncated preview + inspect button
            const preview = data.output.length > 200 ? data.output.slice(0, 200) + '...' : data.output;
            el.querySelector('.badge').className = 'badge badge-completed';
            el.querySelector('.badge').textContent = 'completed';
            const costHtml = data.tokenUsage
              ? `<span class="cost-badge${data.tokenUsage.is_estimated ? ' estimated' : ''}">${data.tokenUsage.model ? data.tokenUsage.model.split('/').pop() + ' · ' : ''}${data.tokenUsage.total_tokens.toLocaleString()} tokens · $${data.tokenUsage.estimated_cost.toFixed(4)}${data.tokenUsage.is_estimated ? ' (est.)' : ''}</span>`
              : '';
            // Check if output contains generated images (Canvas agent)
            let imagesHtml = '';
            try {
              const parsed = JSON.parse(data.output);
              if (parsed?.output?.images && Array.isArray(parsed.output.images)) {
                imagesHtml = '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin:0.5rem 0;">' +
                  parsed.output.images.filter(img => img.data_url).map((img, i) =>
                    `<div style="position:relative;"><img src="${img.data_url}" style="max-width:400px;max-height:300px;border-radius:8px;border:1px solid #2a2a3e;cursor:pointer;" onclick="window.open(this.src)" title="${img.name || 'mockup-' + i}"><div style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:0.65rem;padding:2px 6px;border-radius:4px;">${img.name || 'mockup-' + i}</div></div>`
                  ).join('') + '</div>';
              }
            } catch {}
            el.querySelector('.step-output').innerHTML = `${imagesHtml}<div style="margin-bottom:0.5rem;">${imagesHtml ? '' : preview.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;"><button onclick="openInspector(${data.step})" style="background:#1e1e2e;color:#7c3aed;border:1px solid #2a2a3e;border-radius:6px;padding:4px 12px;font-size:0.75rem;cursor:pointer;">🔍 Inspect Output</button>${costHtml}</div>`;
          }
        }

        if (data.type === 'step-failed') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.remove('running');
            el.classList.add('failed');
            stepOutputs[data.step] = data.output || 'No output captured';
            el.querySelector('.badge').className = 'badge badge-failed';
            el.querySelector('.badge').textContent = 'failed';
            el.querySelector('.step-output').innerHTML = `<div style="margin-bottom:0.5rem;color:#ef4444;">${(data.output || 'No output').replace(/</g,'&lt;').replace(/>/g,'&gt;').slice(0, 200)}</div><div style="display:flex;gap:0.5rem;margin-top:0.5rem;"><button onclick="openInspector(${data.step})" style="background:#1e1e2e;color:#ef4444;border:1px solid #2a2a3e;border-radius:6px;padding:4px 12px;font-size:0.75rem;cursor:pointer;">🔍 Inspect Error</button><button onclick="replayPipeline('${runId}', false, ${data.step})" style="background:#3b82f6;color:white;border:none;border-radius:6px;padding:4px 12px;font-size:0.75rem;font-weight:600;cursor:pointer;">🔁 Replay from here</button></div>`;
          }
        }

        if (data.type === 'step-canceled') {
          const el = document.getElementById(`step-${data.step}`);
          if (el) {
            el.classList.add('canceled');
            el.querySelector('.badge').className = 'badge badge-canceled';
            el.querySelector('.badge').textContent = 'canceled';
            el.querySelector('.step-output').textContent = 'Skipped — previous agent failed';
          }
        }

        if (data.type === 'pipeline-branched') {
          const insertAfter = document.getElementById(`step-${data.step}`);
          if (insertAfter) {
            const branchCount = data.injectedAgents.length;

            // First: re-number all steps AFTER the fork point (shift them forward)
            // Go in reverse to avoid ID collisions
            const allSteps = outputEl.querySelectorAll('.step-result');
            const toRenumber = [];
            allSteps.forEach(el => {
              const idx = parseInt(el.id.replace('step-', ''));
              if (idx > data.step) toRenumber.push({ el, oldIdx: idx });
            });
            toRenumber.sort((a, b) => b.oldIdx - a.oldIdx); // reverse order
            toRenumber.forEach(({ el, oldIdx }) => {
              el.id = `step-${oldIdx + branchCount}`;
            });

            // Add branch indicator
            const branchDiv = document.createElement('div');
            branchDiv.className = 'pipeline-done';
            branchDiv.style.color = '#7c3aed';
            branchDiv.innerHTML = `🔀 Branch ${data.choice}: <strong>${data.label}</strong>`;
            insertAfter.after(branchDiv);

            // Add step cards for injected agents
            let lastEl = branchDiv;
            data.injectedAgents.forEach((a, j) => {
              const stepIdx = data.step + 1 + j;
              const div = document.createElement('div');
              div.className = 'step-result';
              div.id = `step-${stepIdx}`;
              div.innerHTML = `
                <div class="step-header">
                  <span>${a.emoji}</span>
                  <strong>${a.name}</strong>
                  <span class="badge badge-pending">pending</span>
                </div>
                <div class="step-output" style="color: #444;">Waiting...</div>`;
              div.style.animation = 'slideIn 0.3s ease';
              lastEl.after(div);
              lastEl = div;
            });
          }
        }

        if (data.type === 'pipeline-completed') {
          const costSummary = runCost.steps > 0
            ? `<div class="cost-summary">
                <div class="metric"><span class="label">Total Tokens</span><span class="value">${runCost.totalTokens.toLocaleString()}</span></div>
                <div class="metric"><span class="label">Estimated Cost</span><span class="value">$${runCost.totalCost.toFixed(4)}</span></div>
                <div class="metric"><span class="label">Tracked Steps</span><span class="value">${runCost.steps}</span></div>
              </div>` : '';
          outputEl.innerHTML += `<div class="pipeline-done">✅ Pipeline completed!${costSummary}
            <div style="margin-top:0.8rem;display:flex;gap:0.5rem;justify-content:center;">
              <button onclick="replayPipeline('${runId}')" class="btn btn-run" style="font-size:0.8rem;padding:0.5rem 1rem;">🔁 Replay</button>
              <button onclick="replayPipeline('${runId}', true)" class="btn btn-clear" style="font-size:0.8rem;padding:0.5rem 1rem;">🔁 Replay from step…</button>
            </div>
          </div>`;
          evtSource.close();
          btnRun.disabled = false;
        }

        if (data.type === 'pipeline-failed') {
          outputEl.innerHTML += `<div class="pipeline-done" style="color:#ef4444;">❌ Pipeline failed: ${data.error}</div>`;
          evtSource.close();
          btnRun.disabled = false;
        }

        if (data.type === 'pipeline-rerun') {
          outputEl.innerHTML += `<div class="pipeline-done" style="color:#fbbf24;">🔁 Re-running pipeline...</div>`;
          evtSource.close();
          const newRunId = data.newRunId;

          // Use the pipeline array we already have in memory
          outputEl.innerHTML = '';
          pipeline.forEach((a, i) => {
            outputEl.innerHTML += `
              <div class="step-result" id="step-${i}">
                <div class="step-header">
                  <span>${a.emoji}</span>
                  <strong>${a.name}</strong>
                  <span class="badge badge-pending">pending</span>
                </div>
                <div class="step-output" style="color: #444;">Waiting...</div>
              </div>`;
          });

          const newSource = new EventSource(`${basePath}/api/runs/${newRunId}/stream`);
          setupSSE(newSource, newRunId);
        }
      };
    }
  </script>
</body>
</html>
